<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#13131f"/>
      <stop offset="100%" style="stop-color:#0a0a17"/>
    </linearGradient>
    <linearGradient id="bolt" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#818cf8"/>
      <stop offset="100%" style="stop-color:#6366f1"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="16" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="40" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" rx="192" ry="192" fill="url(#bg)"/>

  <!-- Border -->
  <rect width="1024" height="1024" rx="192" ry="192" fill="none" stroke="rgba(99,102,241,0.4)" stroke-width="3"/>

  <!-- Glow halo -->
  <circle cx="512" cy="512" r="240" fill="rgba(99,102,241,0.10)" filter="url(#softglow)"/>

  <!-- Lightning bolt — sharp, centred -->
  <path d="M 580 140 L 392 544 L 496 544 L 444 884 L 672 448 L 556 448 Z"
        fill="url(#bolt)"
        filter="url(#glow)"/>

  <!-- Subtle inner highlight on bolt -->
  <path d="M 580 140 L 392 544 L 496 544 L 444 884 L 672 448 L 556 448 Z"
        fill="none"
        stroke="rgba(255,255,255,0.15)"
        stroke-width="2"/>
</svg>

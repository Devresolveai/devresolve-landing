<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#13131f"/>
      <stop offset="100%" style="stop-color:#0a0a17"/>
    </linearGradient>
    <linearGradient id="bolt" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#818cf8"/>
      <stop offset="100%" style="stop-color:#6366f1"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="96" ry="96" fill="url(#bg)"/>

  <!-- Subtle border -->
  <rect width="512" height="512" rx="96" ry="96" fill="none" stroke="rgba(99,102,241,0.35)" stroke-width="2"/>

  <!-- Indigo glow circle behind bolt -->
  <circle cx="256" cy="256" r="130" fill="rgba(99,102,241,0.12)"/>

  <!-- Lightning bolt — centred, matches site icon -->
  <path d="M 290 96 L 196 272 L 248 272 L 222 416 L 336 224 L 278 224 Z"
        fill="url(#bolt)"
        filter="url(#glow)"
        stroke="rgba(255,255,255,0.08)"
        stroke-width="1.5"/>
</svg>
